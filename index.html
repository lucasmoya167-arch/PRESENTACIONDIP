document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"d8bfc204-f584-4d9f-b2a1-90d429d38c9d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --ink: #0A0A0A;\n    --paper: #F6F4EF;\n    --celeste: #74ACDF;\n    --celeste-deep: #3F89C7;\n    --gold: #F6B40E;\n    --line: rgba(10,10,10,.12);\n    --muted: rgba(10,10,10,.6);\n    --muted-on-dark: rgba(255,255,255,.65);\n  }\n  * { box-sizing: border-box; }\n  html { scroll-behavior: smooth; }\n  body {\n    margin: 0;\n    background: var(--paper);\n    color: var(--ink);\n    font-family: 'Archivo', system-ui, sans-serif;\n    font-size: 18px;\n    line-height: 1.55;\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n  }\n  ::selection { background: var(--gold); color: var(--ink); }\n\n  .display { font-family: 'Archivo Black', 'Archivo', sans-serif; letter-spacing: -0.02em; line-height: .9; }\n  .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }\n\n  /* ---------------- top nav ---------------- */\n  .topnav {\n    position: sticky; top: 0; z-index: 50;\n    background: rgba(246,244,239,.92);\n    backdrop-filter: blur(12px);\n    -webkit-backdrop-filter: blur(12px);\n    border-bottom: 1px solid var(--line);\n  }\n  .topnav-inner {\n    max-width: 1480px; margin: 0 auto;\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 14px 32px;\n    gap: 24px;\n  }\n  .brand {\n    display: flex; align-items: center; gap: 14px;\n    font-family: 'Archivo Black', sans-serif;\n    font-size: 18px; letter-spacing: -.01em;\n    color: var(--ink);\n    text-decoration: none;\n  }\n  footer .brand { color: var(--paper); }\n  .brand-flag {\n    display: flex; gap: 3px;\n  }\n  .brand-flag span { width: 6px; height: 18px; border-radius: 1px; }\n  .brand-flag span:nth-child(1) { background: var(--celeste); }\n  .brand-flag span:nth-child(2) { background: #fff; border: 1px solid rgba(0,0,0,.1); }\n  .brand-flag span:nth-child(3) { background: var(--celeste); }\n  .navlinks {\n    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;\n  }\n  .navlinks a {\n    text-decoration: none; color: var(--ink);\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 12px; letter-spacing: .12em; text-transform: uppercase;\n    padding: 8px 12px; border-radius: 999px;\n    transition: background .15s ease;\n  }\n  .navlinks a:hover { background: rgba(10,10,10,.08); }\n  .nav-cta {\n    background: var(--ink); color: var(--paper);\n    padding: 10px 18px; border-radius: 999px;\n    font-family: 'JetBrains Mono', monospace; font-size: 12px;\n    letter-spacing: .12em; text-transform: uppercase;\n    text-decoration: none;\n    white-space: nowrap;\n  }\n  .nav-cta:hover { background: var(--gold); color: var(--ink); }\n\n  /* ---------------- shared atoms ---------------- */\n  .container { max-width: 1480px; margin: 0 auto; padding: 0 32px; }\n\n  .tag {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 12px; letter-spacing: .18em; text-transform: uppercase;\n    background: var(--ink); color: var(--paper);\n    padding: 6px 14px; border-radius: 999px;\n  }\n  .tag.gold { background: var(--gold); color: var(--ink); }\n  .tag.celeste { background: var(--celeste); color: var(--ink); }\n  .tag.outline { background: transparent; color: var(--ink); border: 1px solid var(--ink); }\n\n  .meta {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 12px; letter-spacing: .18em; text-transform: uppercase;\n    color: var(--muted);\n  }\n\n  .hl-gold {\n    background: linear-gradient(transparent 60%, var(--gold) 60% 92%, transparent 92%);\n    padding: 0 2px;\n  }\n  .hl-celeste {\n    background: linear-gradient(transparent 60%, var(--celeste) 60% 92%, transparent 92%);\n    padding: 0 2px;\n  }\n\n  /* ---------------- hero ---------------- */\n  .hero {\n    background: var(--ink);\n    color: var(--paper);\n    padding: 110px 32px 90px;\n    overflow: hidden;\n    position: relative;\n  }\n  .hero-grid {\n    max-width: 1480px; margin: 0 auto;\n    display: grid; grid-template-columns: 1.05fr .9fr;\n    gap: 60px; align-items: end;\n  }\n  .hero h1 {\n    font-family: 'Archivo Black', sans-serif;\n    font-size: clamp(72px, 11vw, 184px);\n    line-height: .85; letter-spacing: -.04em;\n    margin: 28px 0 0;\n  }\n  .hero h1 .accent { color: var(--gold); }\n  .hero-sub {\n    font-family: 'Archivo Black', sans-serif;\n    font-size: clamp(28px, 3.4vw, 54px);\n    line-height: 1; margin-top: 28px; letter-spacing: -.02em;\n  }\n  .hero-sub .case {\n    background: var(--gold); color: var(--ink);\n    padding: 4px 14px; border-radius: 8px;\n    margin-right: 12px;\n    font-size: .55em; vertical-align: middle;\n    letter-spacing: .14em; font-family: 'JetBrains Mono', monospace; font-weight: 500;\n    text-transform: uppercase;\n  }\n  .hero-meta-row {\n    margin-top: 56px;\n    display: flex; flex-wrap: wrap; gap: 38px 56px;\n  }\n  .hero-meta-row .col .label {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px; letter-spacing: .22em;\n    text-transform: uppercase; color: rgba(255,255,255,.5);\n  }\n  .hero-meta-row .col .value {\n    font-family: 'Archivo', sans-serif; font-weight: 700;\n    font-size: 18px; margin-top: 6px;\n  }\n\n  .hero-card-stack {\n    display: grid;\n    grid-template-rows: 1fr auto;\n    gap: 16px;\n    height: 100%;\n    min-height: 520px;\n  }\n  .hero-photo {\n    border-radius: 28px;\n    overflow: hidden;\n    position: relative;\n    background: #15151a;\n    min-height: 360px;\n  }\n  .hero-photo img {\n    width: 100%; height: 100%;\n    object-fit: cover; object-position: center top;\n    display: block;\n    filter: graysca plotación.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"container\">\n    <div class=\"prose\">\n      <blockquote>\n        “La propiedad intelectual es el aceite que lubrica los engranajes de la economía del conocimiento. Sin protección efectiva, la innovación se detiene.”\n        <cite>OMPI · Informe Mundial sobre la PI · 2022<\u002Fcite>\n      <\u002Fblockquote>\n\n      <p>En un mundo globalizado, donde la economía del conocimiento adquiere una relevancia creciente, la protección de las creaciones intelectuales —ya sean obras literarias, inventos científicos, diseños industriales o signos distintivos— resulta indispensable para fomentar la innovación, la creatividad y el desarrollo económico sostenible.<\u002Fp>\n\n      <p>El presente trabajo aborda de manera integral el régimen jurídico de la propiedad intelectual, con especial énfasis en el sistema de marcas, tanto desde una perspectiva internacional como desde el ordenamiento jurídico argentino y comparado. Se analizan los principales tratados internacionales que regulan la materia, las normas nacionales aplicables, los organismos encargados de su supervisión, los fundamentos filosóficos y dogmáticos que sustentan este campo del derecho, y la evolución histórica del sistema marcario.<\u002Fp>\n\n      <p>Como eje práctico y articulador del análisis teórico, se examina el resonante <strong>caso de Diego Armando Maradona<\u002Fstrong>, cuyo nombre e imagen fueron objeto de disputas registrales y litigios judiciales tanto en Argentina como en el extranjero. Este caso ofrece una ventana privilegiada para comprender cómo opera el derecho marcario en la práctica, los conflictos que pueden surgir cuando convergen distintos ordenamientos jurídicos y las soluciones que el derecho internacional privado propone para su resolución.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== DOGMÁTICA ============== -->\n<section class=\"section dark\" id=\"dogmatica\">\n  <div class=\"section-head\">\n    <div>\n      <span class=\"tag gold\">Sección 02 · Dogmática<\u002Fspan>\n      <div class=\"section-num\">02<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"section-title\">\n      <h2>Cuatro pensadores. Una tensión irresoluble.<\u002Fh2>\n      <p class=\"lede\">La justificación filosófica de la PI ha sido objeto de debate desde sus orígenes: ¿es propiedad natural del trabajo individual, o renta monopólica que privatiza un saber colectivo?<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"container\">\n    <div class=\"prose\" style=\"color: var(--paper);\">\n      <p style=\"color: var(--muted-on-dark);\">Las principales corrientes que han procurado fundar los derechos sobre las creaciones del intelecto se ordenan en una línea que va del liberalismo clásico al pensamiento crítico del Sur Global. Cada una respondió a un contexto histórico distinto, y entre todas componen el campo de discusión que el derecho vigente administra mediante plazos, excepciones y licencias obligatorias.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"thinker-grid\">\n    <div class=\"thinker\">\n      <div class=\"head\">\n        <div>\n          <div class=\"meta\" style=\"color: var(--gold);\">2.1.1 · Trabajo<\u002Fdiv>\n          <div class=\"name\">JOHN<br>LOCKE<\u002Fdiv>\n          <div class=\"yr\">1689<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"num\">I<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"body\">\n        <blockquote style=\"margin: 0 0 18px; padding: 16px 20px; font-size: 16px;\">“El trabajo de su cuerpo y el trabajo de sus manos, podemos decir, son propiamente suyos.” <cite>Segundo Tratado · Cap. V<\u002Fcite><\u002Fblockquote>\n        <p>Locke postula que el hombre posee una propiedad indiscutible sobre su propia persona y, por extensión, sobre el trabajo que realiza. Al “mezclar” su esfuerzo con un recurso, el individuo adquiere un derecho natural de propiedad que no depende del permiso del Estado.<\u002Fp>\n        <p>Aplicado al campo intelectual: cuando un creador invierte energía mental y tiempo en una obra, el resultado es una extensión de su propiedad privada. Apropiarse de la creación ajena equivale a apropiarse del trabajo —y por ende de la vida— del autor.<\u002Fp>\n        <span class=\"pill\">Pilar del liberalismo clásico<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"thinker\">\n      <div class=\"head\">\n        <div>\n          <div class=\"meta\" style=\"color: var(--gold);\">2.1.2 · Autonomía<\u002Fdiv>\n          <div class=\"name\">ROBERT<br>NOZICK<\u002Fdiv>\n          <div class=\"yr\">1974<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"num\">II<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"body\">\n        <blockquote style=\"margin: 0 0 18px; padding: 16px 20px; font-size: 16px;\">“Los individuos tienen derechos, y hay cosas que ninguna persona o grupo puede hacerles sin violar esos derechos.” <cite>Anarquía, Estado y Utopía<\u002Fcite><\u002Fblockquote>\n        <p>Nozick moderniza la tesis lockeana bajo el principio de la <strong>autopropiedad<\u002Fstrong>. El monopolio temporal de marca o patente no perjudica a la sociedad porque, antes de la creación, el objeto no existía: el creador no “quita” nada al dominio público, agrega valor.<\u002Fp>\n        <p>La propiedad sobre las ideas es, para Nozick, el único mecanismo justo de recompensa de la innovación. Sin propiedad exclusiva, no hay libertad creativa real.<\u002Fp>\n        <span class=\"pill\">Self-ownership · Incentivos<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"thinker\">\n      <div class=\"head\">\n        <div>\n          <div class=\"meta\" style=\"color: var(--gold);\">2.1.3 · Crítica<\u002Fdiv>\n          <div class=\"name\">KARL<br>MARX<\u002Fdiv>\n          <div class=\"yr\">general intellect<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"num\">III<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"body\">\n        <blockquote style=\"margin: 0 0 18px; padding: 16px 20px; font-size: 16px;\">“El conocimiento social general se ha convertido en fuerza productiva directa.” <cite>Grundrisse · Fragmento sobre las máquinas<\u002Fcite><\u002Fblockquote>\n        <p>La producción intelectual no es obra de individuos aislados. Toda creación se apoya en una base colectiva: lenguaje, cultura, técnica acumulada, ciencia, educación, cooperación social. Marx llama a esto <strong>general intellect<\u002Fstrong>: conocimiento social vuelto fuerza productiva.<\u002Fp>\n        <p>Lo que la crítica condena no es que el autor reciba retribución, sino que el titular cobre <em>no por producir de nuevo<\u002Fem>, sino por controlar jurídicamente el acceso a la información: la patente que bloquea el medicamento, la marca que apropia un símbolo construido por millones.<\u002Fp>\n        <span class=\"pill\">Renta monopólica<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"thinker\">\n      <div class=\"head\">\n        <div>\n          <div class=\"meta\" style=\"color: var(--gold);\">2.1.4 · Sur Global<\u002Fdiv>\n          <div class=\"name\">CARLOS M.<br>CORREA<\u002Fdiv>\n          <div class=\"yr\">UBA<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"num\">IV<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"body\">\n        <p>Correa define los derechos de PI como <strong>privilegios<\u002Fstrong>: monopolios legales que los Estados conceden con el argumento de estimular la innovación, pero cuya función real depende del contexto.<\u002Fp>\n        <p>El mismo sistema que incentiva la innovación en un país con capacidad tecnológica propia funciona como instrumento de deterioro inventivo en un país importador neto de tecnología. El caso paradigmático: Argentina, segundo productor mundial de soja transgénica, pagando regalías a Monsanto en puertos europeos sobre cargamentos propios.<\u002Fp>\n        <p>Pregunta abierta: ¿el sistema internacional protege al productor nacional, o blinda la renta tecnológica de las empresas del centro?<\u002Fp>\n        <span class=\"pill\">Asimetrías Norte–Sur<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"container\" style=\"margin-top: 80px;\">\n    <div class=\"prose\" style=\"color: var(--paper);\">\n      <h3 style=\"color: var(--gold);\">2.2 · Tensión irresoluble<\u002Fh3>\n      <p style=\"color: var(--muted-on-dark);\">El recorrido revela una tensión entre la protección del creador individual y el interés colectivo en el acceso al conocimiento. Locke y Nozick legitiman el derecho exclusivo como expresión natural del trabajo; Marx y Correa denuncian que ese derecho, en contextos de asimetría tecnológica, se convierte en renta monopólica. El derecho vigente <strong style=\"color: var(--paper);\">no resuelve esta tensión: la administra<\u002Fstrong> mediante plazos, excepciones y mecanismos de licencia obligatoria que expresan el compromiso político de cada época.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== PROPIEDAD INTELECTUAL ============== -->\n<section class=\"section\" id=\"pi\">\n  <div class=\"section-head\">\n    <div>\n      <span class=\"tag\">Sección 03 · Propiedad Intelectual<\u002Fspan>\n      <div class=\"section-num\">03<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"section-title\">\n      <h2>Definición, alcance y arquitectura normativa.<\u002Fh2>\n      <p class=\"lede\">La OMPI define la PI como la rama del derecho que se ocupa de obras, interpretaciones, fonogramas, inventos, diseños y signos distintivos. Tradicionalmente se divide en dos grandes ramas.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"grid-2\">\n    <div class=\"info\">\n      <div class=\"label\">Rama 01<\u002Fdiv>\n      <div class=\"h\">Derecho de autor<\u002Fdiv>\n      <div class=\"b\">Protege obras literarias, artísticas, musicales, cinematográficas y demás creaciones del espíritu, así como los derechos conexos de los intérpretes, productores y organismos de radiodifusión.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"info ink\">\n      <div class=\"label\">Rama 02<\u002Fdiv>\n      <div class=\"h\">Propiedad industrial<\u002Fdiv>\n      <div class=\"b\">Comprende las patentes de invención, los modelos de utilidad, los diseños industriales, las marcas, las indicaciones geográficas y otros signos distintivos.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"container\" style=\"margin-top: 90px;\">\n    <div class=\"prose\">\n      <h3>3.2 · Evolución histórica<\u002Fh3>\n      <p>El reconocimiento jurídico de los derechos sobre las creaciones intelectuales tiene raíces antiguas, aunque su sistematización normativa es relativamente reciente. Con la invención de la imprenta de tipos móviles por <strong>Johannes Gutenberg (ca. 1450)<\u002Fstrong> emergió la necesidad de regular la reproducción y difusión de obras escritas.<\u002Fp>\n\n      <p>El primer antecedente documentado de protección intelectual es el <strong>Estatuto de la Reina Ana (1710)<\u002Fstrong> en Inglaterra, considerado la primera ley de derechos de autor de la historia. En materia de patentes, la <strong>República de Venecia<\u002Fstrong> otorgó en 1474 el primer privilegio patentario conocido.<\u002Fp>\n\n      <p>En Argentina, la protección del derecho de autor se incorporó a la <strong>Constitución Nacional de 1853<\u002Fstrong>, cuyo artículo 17 establece que <em>“todo autor o inventor es propietario exclusivo de su obra, invento o descubrimiento, por el término que le acuerde la ley”<\u002Fem>. Esta disposición de rango constitucional otorga al derecho de autor una jerarquía normativa singular.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- treaties table -->\n  <div class=\"container\" style=\"margin-top: 80px;\">\n    <span class=\"tag outline\">3.3 · Cuadro sinóptico de tratados<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"treaties container\">\n    <div class=\"treaty-head\">\n      <div>Año<\u002Fdiv>\n      <div>Tratado<\u002Fdiv>\n      <div>Organismo<\u002Fdiv>\n      <div class=\"matter\">Materia<\u002Fdiv>\n      <div class=\"members\">Miembros<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"treaty-row\">\n      <div class=\"yr\">1883<\u002Fdiv>\n      <div class=\"name\">Convenio de París<\u002Fdiv>\n      <div class=\"organ\">OMPI<\u002Fdiv>\n      <div class=\"matter\">Propiedad industrial<\u002Fdiv>\n      <div class=\"members\">+180<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"treaty-row\">\n      <div class=\"yr\">1886<\u002Fdiv>\n      <div class=\"name\">Convenio de Berna<\u002Fdiv>\n      <div class=\"organ\">OMPI<\u002Fdiv>\n      <div class=\"matter\">Derecho de autor<\u002Fdiv>\n      <div class=\"members\">+180<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"treaty-row\">\n      <div class=\"yr\">1891<\u002Fdiv>\n      <div class=\"name\">Arreglo de Madrid<\u002Fdiv>\n      <div class=\"organ\">OMPI<\u002Fdiv>\n      <div class=\"matter\">Registro internacional de marcas (versión original)<\u002Fdiv>\n      <div class=\"members\">+90<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"treaty-row\">\n      <div class=\"yr\">1957<\u002Fdiv>\n      <div class=\"name\">Arreglo de Niza<\u002Fdiv>\n      <div class=\"organ\">OMPI<\u002Fdiv>\n      <div class=\"matter\">Clasificación marcaria · 45 clases<\u002Fdiv>\n      <div class=\"members\">+90<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"treaty-row\">\n      <div class=\"yr\">1989<\u002Fdiv>\n      <div class=\"name\">Protocolo de Madrid<\u002Fdiv>\n      <div class=\"organ\">OMPI<\u002Fdiv>\n      <div class=\"matter\">Registro internacional · versión modernizada<\u002Fdiv>\n      <div class=\"members\">+130<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"treaty-row\">\n      <div class=\"yr\">1994<\u002Fdiv>\n      <div class=\"name\">ADPIC / TRIPS<\u002Fdiv>\n      <div class=\"organ\">OMC<\u002Fdiv>\n      <div class=\"matter\">PI y comercio · estándares mínimos<\u002Fdiv>\n      <div class=\"members\">+164<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"treaty-row\">\n      <div class=\"yr\">2006<\u002Fdiv>\n      <div class=\"name\">Tratado de Singapur<\u002Fdiv>\n      <div class=\"organ\">OMPI<\u002Fdiv>\n      <div class=\"matter\">Procedimiento administrativo de marcas<\u002Fdiv>\n      <div class=\"members\">+55<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"treaty-row\">\n      <div class=\"yr\">2013<\u002Fdiv>\n      <div class=\"name\">Tratado de Marrakech<\u002Fdiv>\n      <div class=\"organ\">OMPI<\u002Fdiv>\n      <div class=\"matter\">Acceso a obras · personas con discapacidad visual<\u002Fdiv>\n      <div class=\"members\">+90<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"treaty-row\">\n      <div class=\"yr\">1889<br>1940<\u002Fdiv>\n      <div class=\"name\">Tratados de Montevideo<\u002Fdiv>\n      <div class=\"organ\">DIPriv<\u002Fdiv>\n      <div class=\"matter\">Regla de territorialidad · ley del registro<\u002Fdiv>\n      <div class=\"members\">AR · UY · PY · BO · PE<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"container\" style=\"margin-top: 80px;\">\n    <div class=\"prose\">\n      <h3>3.4 · Normas aplicables en Argentina<\u002Fh3>\n      <ul>\n        <li><strong>Constitución Nacional, art. 17:<\u002Fstrong> reconoce con rango constitucional el derecho de autor y del inventor.<\u002Fli>\n        <li><strong>Ley 11.723 (1933):<\u002Fstrong> derecho de autor sobre obras literarias, científicas y artísticas. Vida del autor + 70 años post mortem.<\u002Fli>\n        <li><strong>Ley 22.362 (1980):<\u002Fstrong> régimen marcario. Sistema atributivo: la propiedad se adquiere por registro ante el INPI.<\u002Fli>\n        <li><strong>Ley 24.481 (1995):<\u002Fstrong> patentes de invención y modelos de utilidad. Derechos exclusivos por 20 años desde la solicitud.<\u002Fli>\n        <li><strong>CCyCN (Ley 26.994, 2015):<\u002Fstrong> arts. 52, 53 y 55 — derechos a la imagen y al nombre, articulados con el régimen marcario.<\u002Fli>\n      <\u002Ful>\n      <p>Argentina es miembro de la OMPI, adherida al Convenio de París, al Convenio de Berna y al ADPIC. Su <strong>no adhesión al Sistema de Madrid<\u002Fstrong> constituye una limitación estructural para los titulares argentinos que desean proteger sus marcas en el exterior.<\u002Fp>\n\n      <h3>3.5 · MERCOSUR<\u002Fh3>\n      <p>En MERCOSUR existe cooperación y armonización parcial, pero la protección sigue siendo <strong>territorial y nacional<\u002Fstrong>: una marca registrada en Argentina no queda automáticamente protegida en Brasil, Paraguay o Uruguay. El instrumento regional clave es la <strong>Decisión CMC N° 08/95<\u002Fstrong>. Brasil es parte del Protocolo de Madrid desde 2019; Argentina no.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- entes -->\n  <div class=\"grid-3\">\n    <div class=\"info celeste\">\n      <div class=\"label\">Internacional · 01<\u002Fdiv>\n      <div class=\"h\">OMPI<\u002Fdiv>\n      <div class=\"b\">Foro global. Armoniza políticas, dicta definiciones técnicas y administra los Sistemas de Madrid, La Haya y otros registros internacionales.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"info gold\">\n      <div class=\"label\">Internacional · 02<\u002Fdiv>\n      <div class=\"h\">OMC<\u002Fdiv>\n      <div class=\"b\">Administra el ADPIC. Establece niveles mínimos de protección. Su mecanismo de solución de diferencias habilita sanciones comerciales.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"info ink\">\n      <div class=\"label\">Argentina<\u002Fdiv>\n      <div class=\"h\">INPI · DNDA · CCC FED.<\u002Fdiv>\n      <div class=\"b\">INPI gestiona marcas y patentes. DNDA registra obras. La Cámara Civil y Comercial Federal entiende en impugnaciones a resoluciones del INPI y litigios marcarios.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== MARCAS ============== -->\n<section class=\"section celeste\" id=\"marcas\">\n  <div class=\"section-head\">\n    <div>\n      <span class=\"tag\">Sección 04 · Marcas<\u002Fspan>\n      <div class=\"section-num\">04<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"section-title\">\n      <h2>El signo que distingue.<\u002Fh2>\n      <p class=\"lede\">Una marca es un signo susceptible de representación gráfica que distingue los productos o servicios de una empresa de los de otras. Su función esencial es <strong>indicar el origen empresarial<\u002Fstrong>.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"grid-3\">\n    <div class=\"info\">\n      <div class=\"label\">Función 01<\u002Fdiv>\n      <div class=\"h\">Distintiva<\u002Fdiv>\n      <div class=\"b\">Diferencia los productos o servicios de un empresario de los de sus competidores.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"info\">\n      <div class=\"label\">Función 02<\u002Fdiv>\n      <div class=\"h\">Origen empresarial<\u002Fdiv>\n      <div class=\"b\">Informa al consumidor sobre la procedencia de los bienes o servicios.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"info\">\n      <div class=\"label\">Función 03<\u002Fdiv>\n      <div class=\"h\">Garantía de calidad<\u002Fdiv>\n      <div class=\"b\">El consumidor asocia los productos con un determinado nivel de calidad.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"info\">\n      <div class=\"label\">Función 04<\u002Fdiv>\n      <div class=\"h\">Comunicación<\u002Fdiv>\n      <div class=\"b\">Condensa la imagen, reputación y posicionamiento de la empresa.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"info\">\n      <div class=\"label\">Función 05<\u002Fdiv>\n      <div class=\"h\">Inversión<\u002Fdiv>\n      <div class=\"b\">Protege la inversión realizada en el desarrollo y posicionamiento de los productos o servicios.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"info ink\">\n      <div class=\"label\">Régimen AR<\u002Fdiv>\n      <div class=\"h\">Ley 22.362<\u002Fdiv>\n      <div class=\"b\">Sistema atributivo · 10 años renovables · Cámara Civil y Comercial Federal como alzada del INPI.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"container\" style=\"margin-top: 90px;\">\n    <span class=\"tag outline\">4.4 · Tipos de marcas<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"marks-grid\">\n    <div class=\"mark-chip\">\n      <div class=\"num\">01<\u002Fdiv>\n      <div class=\"name\">DENOMINATIVAS<\u002Fdiv>\n      <div class=\"ex\">Palabras, letras, cifras o combinaciones — ej. “Maradona”, “El Diez”.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mark-chip\">\n      <div class=\"num\">02<\u002Fdiv>\n      <div class=\"name\">FIGURATIVAS<\u002Fdiv>\n      <div class=\"ex\">Imágenes, logotipos, diseños — el swoosh de Nike, la estrella de Mercedes.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mark-chip\">\n      <div class=\"num\">03<\u002Fdiv>\n      <div class=\"name\">MIXTAS<\u002Fdiv>\n      <div class=\"ex\">Denominativo + figurativo — Lacoste, Quilmes.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mark-chip\">\n      <div class=\"num\">04<\u002Fdiv>\n      <div class=\"name\">TRIDIMENSIONALES<\u002Fdiv>\n      <div class=\"ex\">Formas de productos o envases — botella de Toblerone, frasco de Chanel N°5.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mark-chip ink\">\n      <div class=\"num\">05<\u002Fdiv>\n      <div class=\"name\">SONORAS<\u002Fdiv>\n      <div class=\"ex\">Jingle de Intel, rugido del león de la MGM.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mark-chip ink\">\n      <div class=\"num\">06<\u002Fdiv>\n      <div class=\"name\">DE COLOR<\u002Fdiv>\n      <div class=\"ex\">Tiffany &amp; Co. registró el azul celeste (Pantone 1837).<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mark-chip ink\">\n      <div class=\"num\">07<\u002Fdiv>\n      <div class=\"name\">DE CERTIFICACIÓN<\u002Fdiv>\n      <div class=\"ex\">Sello “Fair Trade”, sello kosher.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mark-chip ink\">\n      <div class=\"num\">08<\u002Fdiv>\n      <div class=\"name\">COLECTIVAS<\u002Fdiv>\n      <div class=\"ex\">“Champagne”, “Vinos de la Costa” (Berisso).<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- qué sí / qué no -->\n  <div class=\"grid-2\" style=\"margin-top: 60px;\">\n    <div class=\"info\">\n      <div class=\"label\">4.5 · Registrabilidad<\u002Fdiv>\n      <div class=\"h\">¿Qué SÍ se puede?<\u002Fdiv>\n      <div class=\"b\">Todo signo con capacidad distintiva no comprendido en causales de irregistrabilidad: palabras, letras, números, eslóganes, dibujos, monogramas, colores en lugares determinados. Los <strong>nombres de personas<\u002Fstrong> sólo pueden registrarse por el propio interesado o con su consentimiento expreso (art. 3 inc. f, Ley 22.362).<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"info ink\">\n      <div class=\"label\">4.6 · Irregistrabilidad<\u002Fdiv>\n      <div class=\"h\">¿Qué NO se puede?<\u002Fdiv>\n      <div class=\"b\">Sin aptitud distintiva (art. 2): genéricos, descriptivos, uso común, forma necesaria, un solo color. Por orden público (art. 3): confusión con marcas anteriores, denominaciones de origen, marcas engañosas, contrarias a la moral, símbolos oficiales, religiosos, y <strong style=\"color: var(--gold);\">nombres o retratos sin consentimiento del titular o herederos hasta el 4.º grado<\u002Fstrong>.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"grid-2\" style=\"margin-top: 24px;\">\n    <div class=\"info\">\n      <div class=\"label\">4.7 · Protección reforzada<\u002Fdiv>\n      <div class=\"h\">Marca notoria<\u002Fdiv>\n      <div class=\"b\">Conocida por el sector pertinente del público consumidor. Protección extendida a clases distintas si hay riesgo de explotación desleal.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"info ink\">\n      <div class=\"label\">4.7 · Protección reforzada<\u002Fdiv>\n      <div class=\"h\">Marca renombrada<\u002Fdiv>\n      <div class=\"b\">Conocida por el público en general. Protección máxima en cualquier clase, incluso sin riesgo de confusión. <span class=\"hl-gold\" style=\"color: var(--ink);\">Maradona · Diego Maradona · El Diez:<\u002Fspan> notorias y renombradas a escala global.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== CASO MARADONA ============== -->\n<section class=\"section\" id=\"caso\">\n  <div class=\"section-head\">\n    <div>\n      <span class=\"tag celeste\">Sección 05 · El Caso<\u002Fspan>\n      <div class=\"section-num\">05<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"section-title\">\n      <h2>Diego Armando Maradona.<br>30·10·1960 — 25·11·2020.<\u002Fh2>\n      <p class=\"lede\">Su dimensión pública convirtió nombre, imagen, número de camiseta y otros elementos de su identidad en activos comerciales de enorme valor. Lo que sigue es el laboratorio jurídico que dejó.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"container\">\n    <div class=\"prose\">\n      <h3>5.1 · Contexto y relevancia jurídica<\u002Fh3>\n      <p>Considerado uno de los mejores futbolistas de la historia y el ídolo indiscutido del fútbol argentino, su trayectoria en clubes como Boca Juniors, Barcelona, Napoli y Sevilla, y su rol protagónico en el Mundial de 1986 —donde anotó el “Gol del Siglo” y guió a Argentina al título— lo convirtieron en una figura de proyección global sin precedentes en el deporte.<\u002Fp>\n      <p>Su nombre fue objeto de registros marcarios en decenas de países, tanto por parte de empresas legítimamente autorizadas como por terceros oportunistas que buscaron apropiarse de la notoriedad de su figura.<\u002Fp>\n\n      <h3>5.2 · La trama Sattvica<\u002Fh3>\n      <p>Tras el fallecimiento de Maradona, surgió públicamente que su exabogado y representante <strong>Matías Morla<\u002Fstrong> era presidente de <strong>Sattvica S.A.<\u002Fstrong>, empresa que tenía registradas a su nombre las marcas “Maradona”, “Diego Maradona”, “El Diego”, “El 10”, “Diegol” y “La Mano de Dios”, tanto en Argentina como en varios países del mundo. Morla sostuvo que esas marcas habían sido cedidas a Sattvica mediante un contrato de autorización firmado el 28 de marzo de 2016.<\u002Fp>\n      <p>Las hijas <strong>Dalma y Giannina Maradona<\u002Fstrong> refutaron la legitimidad de esa cesión. Presentaron una denuncia penal por administración fraudulenta, estafa y circunvención de incapaces ante la Justicia de La Plata. Paralelamente, el administrador de la sucesión <strong>Sebastián Baglietto<\u002Fstrong> inició la causa civil 79035/2021 ante el fuero Civil y Comercial Federal, reclamando la nulidad de las transferencias y la reivindicación de las marcas para el acervo hereditario.<\u002Fp>\n      <p>El cuadro se complejizó cuando, <strong>apenas horas después de los allanamientos<\u002Fstrong> al estudio de Morla en el marco de la causa penal, Sattvica presentó ante el INPI <strong>147 nuevas solicitudes<\u002Fstrong> de registro de marcas vinculadas a Maradona, en todas sus variantes denominativa, figurativa y mixta. El fiscal calificó esta maniobra como indicativa de mala fe.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- timeline del caso -->\n  <div class=\"container\" style=\"margin-top: 60px;\">\n    <span class=\"tag outline\">Cronología procesal<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"timeline\">\n    <div class=\"tl-item\">\n      <div class=\"tl-date\">04 · ENE · 2016<\u002Fdiv>\n      <div class=\"tl-title\">Convenio de transferencia<\u002Fdiv>\n      <div class=\"tl-body\">Maradona habría firmado el convenio que cede a Sattvica S.A. la titularidad de las marcas que recaen sobre su nombre, imagen, seudónimos y derecho a registrar nuevas en cualquier país.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-item\">\n      <div class=\"tl-date\">28 · MAR · 2016<\u002Fdiv>\n      <div class=\"tl-title\">Affidavit de Dubai<\u002Fdiv>\n      <div class=\"tl-body\">Documento ratificatorio firmado en Emiratos Árabes Unidos. La actora cuestiona su validez por estar redactado en inglés y árabe, idiomas que Maradona no dominaba.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-item\">\n      <div class=\"tl-date\">25 · NOV · 2020<\u002Fdiv>\n      <div class=\"tl-title\">Fallecimiento<\u002Fdiv>\n      <div class=\"tl-body\">Mueren los derechos personalísimos en cuanto al ejercicio en vida; los derechos sobre nombre e imagen pasan a sus herederos (art. 53 CCyCN).<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-item\">\n      <div class=\"tl-date\">26 · MAR · 2021<\u002Fdiv>\n      <div class=\"tl-title\">Mediación previa<\u002Fdiv>\n      <div class=\"tl-body\">Citación a mediación promovida por la sucesión. Es la fecha que la defensa usa para computar la prescripción quinquenal.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-item\">\n      <div class=\"tl-date\">2021<\u002Fdiv>\n      <div class=\"tl-title\">Allanamientos + 147 solicitudes<\u002Fdiv>\n      <div class=\"tl-body\">Horas después del allanamiento al estudio de Morla, Sattvica presenta 147 nuevas solicitudes ante el INPI. Maniobra calificada de mala fe por el fiscal.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-item\">\n      <div class=\"tl-date\">OCT · 2022<\u002Fdiv>\n      <div class=\"tl-title\">Resolución de 1.ª Instancia<\u002Fdiv>\n      <div class=\"tl-body\">Juzgado Civil y Comercial Federal N° 8 (Marcelo Gota) hace lugar a la excepción de incompetencia respecto de las marcas extranjeras y difiere prescripción y falta de acción a la sentencia definitiva.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-item\">\n      <div class=\"tl-date\">OCT · 2023<\u002Fdiv>\n      <div class=\"tl-title\">Cámara · Sala I<\u002Fdiv>\n      <div class=\"tl-body\">Causa N° 3959/2021-S.I. Las Dras. Nallar y Perozziello Vizier y el Dr. Uriarte revocan parcialmente y admiten la jurisdicción internacional argentina sobre los registros extranjeros.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== ARCHIVO · PDFs ============== -->\n<section class=\"archive\" id=\"archivo\">\n  <div class=\"archive-head\">\n    <div>\n      <span class=\"tag gold\">Archivo del caso<\u002Fspan>\n      <h2>EXPEDIENTES <span class=\"acc\">EN PDF.<\u002Fspan><\u002Fh2>\n    <\u002Fdiv>\n    <div>\n      <p class=\"note\">Cuatro piezas judiciales del Caso Maradona, abiertas en pestaña nueva. Demanda de los herederos, contestación de Morla / Sattvica, resolución de primera instancia y sentencia de Cámara.<\u002Fp>\n      <div class=\"meta\" style=\"color: var(--gold); margin-top: 14px;\">Causa civil 79035/2021 · CCCFed Sala I · 3959/2021<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"archive-grid\">\n    <a class=\"doc-card\" href=\"Demanda Marca Maradona.pdf\" target=\"_blank\" rel=\"noopener\">\n      <div class=\"ix\">DOC · 01<\u002Fdiv>\n      <div class=\"ico\"><i><\u002Fi><\u002Fdiv>\n      <div class=\"title\">DEMANDA · MARCA MARADONA<\u002Fdiv>\n      <div class=\"sub\">Escrito de inicio. La sucesión reclama nulidad de las transferencias y reivindicación marcaria.<\u002Fdiv>\n      <div class=\"meta-row\">\n        <span>PDF<\u002Fspan>\n        <span class=\"open\">Abrir →<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fa>\n\n    <a class=\"doc-card\" href=\"Contestación de demanda Morla.pdf\" target=\"_blank\" rel=\"noopener\">\n      <div class=\"ix\">DOC · 02<\u002Fdiv>\n      <div class=\"ico\"><i><\u002Fi><\u002Fdiv>\n      <div class=\"title\">CONTESTACIÓN · MORLA / SATTVICA<\u002Fdiv>\n      <div class=\"sub\">Excepciones de incompetencia, prescripción y falta de acción + defensa de fondo sobre la validez de la cesión.<\u002Fdiv>\n      <div class=\"meta-row\">\n        <span>PDF<\u002Fspan>\n        <span class=\"open\">Abrir →<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fa>\n\n    <a class=\"doc-card\" href=\"Resol primera instancia Marcas Maradona.pdf\" target=\"_blank\" rel=\"noopener\">\n      <div class=\"ix\">DOC · 03<\u002Fdiv>\n      <div class=\"ico\"><i><\u002Fi><\u002Fdiv>\n      <div class=\"title\">RESOL · 1.ª INSTANCIA<\u002Fdiv>\n      <div class=\"sub\">Juzgado Civil y Comercial Federal N° 8. Resuelve excepciones previas y declara incompetencia sobre marcas extranjeras.<\u002Fdiv>\n      <div class=\"meta-row\">\n        <span>PDF<\u002Fspan>\n        <span class=\"open\">Abrir →<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fa>\n\n    <a class=\"doc-card\" href=\"Sentencia de Cámara Maradona.pdf\" target=\"_blank\" rel=\"noopener\">\n      <div class=\"ix\">DOC · 04<\u002Fdiv>\n      <div class=\"ico\"><i><\u002Fi><\u002Fdiv>\n      <div class=\"title\">SENTENCIA · CÁMARA SALA I<\u002Fdiv>\n      <div class=\"sub\">CCCFed · Causa 3959/2021-S.I. Reconoce la jurisdicción internacional argentina sobre los registros extranjeros.<\u002Fdiv>\n      <div class=\"meta-row\">\n        <span>PDF<\u002Fspan>\n        <span class=\"open\">Abrir →<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== SENTENCIAS ============== -->\n<section class=\"section\" id=\"sentencias\">\n  <div class=\"section-head\">\n    <div>\n      <span class=\"tag\">Sección 06 · Sentencias<\u002Fspan>\n      <div class=\"section-num\">06<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"section-title\">\n      <h2>Lo que decidieron los jueces.<\u002Fh2>\n      <p class=\"lede\">Dos instancias, una pregunta clave: <span class=\"hl-celeste\">¿hasta dónde alcanza la jurisdicción argentina?<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"container\">\n    <div class=\"prose\">\n      <h3>6.1 · Naturaleza de la resolución de 1.ª instancia<\u002Fh3>\n      <p>La resolución dictada por el Juez Marcelo Gota en octubre de 2022 es una <strong>sentencia interlocutoria<\u002Fstrong> que resuelve excepciones previas, sin ingresar al fondo. No se trata de una sentencia definitiva, sino de una resolución sobre cuestiones de derecho procesal — principalmente la competencia del tribunal.<\u002Fp>\n\n      <h3>6.2 · Decisiones en 1.ª instancia<\u002Fh3>\n      <p>El juez difirió la prescripción y la falta de acción a la sentencia definitiva, por requerir prueba. Hizo lugar a la <strong>excepción de incompetencia respecto de las marcas registradas en el extranjero<\u002Fstrong>, aplicando el principio de territorialidad y los arts. 2601, 2603 inc. a) y 2609 del CCyCN. La consecuencia práctica: obligaba a los herederos a iniciar más de 20 acciones judiciales paralelas en distintas jurisdicciones e idiomas, argumento central que la Cámara usaría para revocarla.<\u002Fp>\n\n      <h3>6.3 · Sentencia de Cámara · Sala I · oct. 2023<\u002Fh3>\n      <p>Cámara Nacional de Apelaciones en lo Civil y Comercial Federal — Sala I (Dras. <strong>Florencia Nallar<\u002Fstrong> y <strong>Juan Perozziello Vizier<\u002Fstrong>; Dr. <strong>Fernando A. Uriarte<\u002Fstrong>), en la <strong>Causa N° 3959/2021-S.I.<\u002Fstrong><\u002Fp>\n      <p>La Cámara encuadró la pretensión como <strong>acción de reivindicación marcaria de carácter personal<\u002Fstrong>, concerniente a la órbita de la responsabilidad civil de fuente no contractual. Aplicó el art. 56 de los Tratados de Montevideo para los países signatarios y el art. 2656 del CCyCN para el resto. Concluyó que los jueces argentinos son competentes dado que <strong>los demandados tienen domicilio en Argentina<\u002Fstrong> y el daño se manifiesta en el acervo hereditario que tramita ante tribunales argentinos.<\u002Fp>\n      <p>Ponderó la <strong>notoriedad internacional<\u002Fstrong> de Maradona como factor relevante, habilitando la protección extendida del art. 6 bis del Convenio de París y el art. 16.2 del ADPIC. <strong>Resolvió:<\u002Fstrong> revocar parcialmente y admitir la jurisdicción internacional argentina para conocer en la acción de reivindicación marcaria sobre los registros extranjeros, con costas en el orden causado.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- aporte cámara -->\n  <div class=\"grid-2\" style=\"margin-top: 60px;\">\n    <div class=\"info celeste\">\n      <div class=\"label\">Plano 1<\u002Fdiv>\n      <div class=\"h\">Dónde surten efecto los registros<\u002Fdiv>\n      <div class=\"b\">Sigue siendo territorial: el registro vale en el país donde se inscribió. Ese plano no se modifica.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"info ink\">\n      <div class=\"label\">Plano 2 · novedad<\u002Fdiv>\n      <div class=\"h\" style=\"color: var(--gold);\">Dónde ocurre el ilícito + del autor<\u002Fdiv>\n      <div class=\"b\">Cuando la pretensión se encuadra como acción personal de responsabilidad civil, habilita la jurisdicción argentina si el ilícito se ejecutó desde Argentina y el demandado está domiciliado aquí.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== APLICACIÓN AL CASO ============== -->\n<section class=\"section gold\" id=\"aplicacion\">\n  <div class=\"section-head\">\n    <div>\n      <span class=\"tag outline\">Sección 07 · Aplicación<\u002Fspan>\n      <div class=\"section-num\">07<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"section-title\">\n      <h2>Cinco ejes de aplicación.<\u002Fh2>\n      <p class=\"lede\">El caso opera como laboratorio del cruce entre derecho marcario, derechos de la personalidad y DIPriv. De la aplicación de las normas a los hechos surgen cinco conclusiones operativas.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"grid-3\">\n    <div class=\"info ink\">\n      <div class=\"label\">Eje 01<\u002Fdiv>\n      <div class=\"h\">Primacía del consentimiento<\u002Fdiv>\n      <div class=\"b\">Argentina (Ley 22.362, art. 3 inc. f) y EEUU (Lanham Act, §2(c)) exigen consentimiento expreso para registrar marcas que incluyan identidad ajena. No se presume.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"info ink\">\n      <div class=\"label\">Eje 02<\u002Fdiv>\n      <div class=\"h\">Territorialidad<\u002Fdiv>\n      <div class=\"b\">Los registros son territoriales. Una marca registrada en Argentina sólo produce efectos en ese territorio. Los conflictos extranjeros se resuelven con derecho local.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"info ink\">\n      <div class=\"label\">Eje 03<\u002Fdiv>\n      <div class=\"h\">Notoriedad como agravante<\u002Fdiv>\n      <div class=\"b\">Cuanto más reconocible es un signo, mayor el daño potencial de su registro ilícito y mayor la responsabilidad del infractor.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"info ink\">\n      <div class=\"label\">Eje 04<\u002Fdiv>\n      <div class=\"h\">Sucesión de derechos<\u002Fdiv>\n      <div class=\"b\">Fallecido Maradona, sus derechos sobre nombre e imagen pasaron a sus herederos. Los conflictos sucesorios y marcarios se entrelazaron.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"info ink\">\n      <div class=\"label\">Eje 05<\u002Fdiv>\n      <div class=\"h\">Protección post mortem<\u002Fdiv>\n      <div class=\"b\">El art. 53 del CCyCN protege la imagen post mortem y los herederos pueden ejercer acciones por su uso no autorizado.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"info\">\n      <div class=\"label\">Síntesis<\u002Fdiv>\n      <div class=\"h\">Un caso jurisprudencial<\u002Fdiv>\n      <div class=\"b\">El precedente Maradona aplica a toda figura pública de notoriedad internacional cuyo nombre sea apropiado mediante maniobras ejecutadas desde Argentina.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== CONCLUSIONES ============== -->\n<section class=\"section\" id=\"conclusiones\">\n  <div class=\"section-head\">\n    <div>\n      <span class=\"tag\">Sección 08 · Conclusión<\u002Fspan>\n      <div class=\"section-num\">08<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"section-title\">\n      <h2>Cinco conclusiones fundadas.<\u002Fh2>\n      <p class=\"lede\">Articuladas en ejes que permiten valorar integralmente el caso Maradona y sus implicancias para el derecho marcario argentino e internacional.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"conc-grid\">\n    <div class=\"conc-card first\">\n      <div class=\"num\">8.1<\u002Fdiv>\n      <h3>El consentimiento como eje estructural.<\u002Fh3>\n      <p>El consentimiento del titular constituye el requisito fundamental e indisponible para el registro de marcas que incluyan el nombre, pseudónimo o imagen de una persona. Todo el litigio gira en torno a su validez: si Maradona otorgó un consentimiento libre, pleno y genuino, las transferencias son válidas; si estuvo viciado por incapacidad, engaño o exceso de mandato del apoderado, las transferencias son nulas de pleno derecho. Las pericias médicas sobre el estado cognitivo al momento de la firma resultan decisivas. La conducta post mortem de Sattvica —el registro masivo de 147 marcas horas después del allanamiento— opera como indicio grave de mala fe.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"conc-card\">\n      <div class=\"num\">8.2<\u002Fdiv>\n      <h3>Territorialidad y sus límites.<\u002Fh3>\n      <p>La Cámara demostró que la territorialidad opera como regla de validez y efectos del registro, pero <strong>no como regla de competencia jurisdiccional<\u002Fstrong> cuando la pretensión se encuadra como acción personal de responsabilidad civil. Esta distinción es el aporte jurídico más relevante de la sentencia y permite que los jueces argentinos conozcan sobre registros extranjeros obtenidos mediante una maniobra ejecutada desde Argentina.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"conc-card\">\n      <div class=\"num\">8.3<\u002Fdiv>\n      <h3>Notoriedad y protección agravada.<\u002Fh3>\n      <p>La notoriedad internacional no es decorativa: activa regímenes de protección ampliada. El art. 6 bis del Convenio de París y el art. 16.2 del ADPIC establecen que la marca notoria goza de protección extendida más allá del principio de territorialidad estricta. A mayor notoriedad, mayor el daño potencial del registro ilícito y mayor la responsabilidad del infractor.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"conc-card\">\n      <div class=\"num\">8.4<\u002Fdiv>\n      <h3>Vulnerabilidad post mortem y tutela hereditaria.<\u002Fh3>\n      <p>El fallecimiento no extinguió los derechos sobre nombre e imagen, sino que los transmitió a los herederos. La muerte abrió una ventana de vulnerabilidad inmediatamente explotada por Sattvica con la presentación masiva de 147 nuevas solicitudes. El art. 53 y el art. 72 del CCyCN brindan a los herederos legitimación activa para accionar; toda solicitud post mortem sin su consentimiento es nula conforme al art. 3 inc. f) de la Ley 22.362.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"conc-card\">\n      <div class=\"num\">8.5<\u002Fdiv>\n      <h3>Registro preventivo: una falla sistémica.<\u002Fh3>\n      <p>El caso expone una falla del ordenamiento marcario argentino: la ausencia de un mecanismo de registro preventivo internacional accesible para figuras públicas de proyección global. La adhesión al Sistema de Madrid permitiría a los titulares argentinos proteger sus marcas en múltiples jurisdicciones mediante una solicitud única, evitando el peregrinaje judicial que hoy enfrentan los herederos de Maradona.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== FOOTER ============== -->\n<footer>\n  <div class=\"foot-grid\">\n    <div>\n      <div class=\"brand\" style=\"color: var(--paper);\">\n        <span class=\"brand-flag\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fspan>\n        PROPIEDAD INTELECTUAL · MARADONA\n      <\u002Fdiv>\n      <p style=\"margin-top: 18px; color: var(--muted-on-dark); max-width: 520px; font-size: 16px; line-height: 1.55;\">\n        Trabajo final de Derecho Internacional Privado. Análisis doctrinario, comparado y jurisprudencial sobre el régimen marcario argentino e internacional, articulado en torno al caso Maradona.\n      <\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <h4>Secciones<\u002Fh4>\n      <ul>\n        <li><a href=\"#intro\">01 · Introducción<\u002Fa><\u002Fli>\n        <li><a href=\"#dogmatica\">02 · Dogmática<\u002Fa><\u002Fli>\n        <li><a href=\"#pi\">03 · Propiedad Intelectual<\u002Fa><\u002Fli>\n        <li><a href=\"#marcas\">04 · Marcas<\u002Fa><\u002Fli>\n        <li><a href=\"#caso\">05 · Caso Maradona<\u002Fa><\u002Fli>\n        <li><a href=\"#sentencias\">06 · Sentencias<\u002Fa><\u002Fli>\n        <li><a href=\"#conclusiones\">08 · Conclusión<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div>\n      <h4>Archivo del caso<\u002Fh4>\n      <ul>\n        <li><a href=\"Demanda Marca Maradona.pdf\" target=\"_blank\" rel=\"noopener\">Demanda<\u002Fa><\u002Fli>\n        <li><a href=\"Contestación de demanda Morla.pdf\" target=\"_blank\" rel=\"noopener\">Contestación · Morla<\u002Fa><\u002Fli>\n        <li><a href=\"Resol primera instancia Marcas Maradona.pdf\" target=\"_blank\" rel=\"noopener\">Resol. 1.ª instancia<\u002Fa><\u002Fli>\n        <li><a href=\"Sentencia de Cámara Maradona.pdf\" target=\"_blank\" rel=\"noopener\">Sentencia · Cámara<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"foot-bot\">\n    <span>DIPriv · Mayo 2026<\u002Fspan>\n    <span>Causa 79035/2021 · CCCFed S.I. 3959/2021<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  // reveal on scroll\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (e.isIntersecting) {\n        e.target.classList.add('in');\n        io.unobserve(e.target);\n      }\n    });\n  }, { threshold: 0.15 });\n  document.querySelectorAll('.reveal').forEach(el => io.observe(el));\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
